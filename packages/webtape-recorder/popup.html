<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebTape Recorder</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon48.png" alt="WebTape" class="logo">
      <div class="title-block">
        <h1>WebTape</h1>
        <span class="subtitle">Web Action Recorder</span>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Idle</span>
    </div>

    <div class="controls">
      <button id="btnDirectRecord" class="btn btn-primary">
        <span class="btn-icon">&#9654;</span>
        Direct Record
      </button>
      <button id="btnRefreshRecord" class="btn btn-secondary">
        <span class="btn-icon">&#8635;</span>
        Refresh &amp; Record
      </button>
      <button id="btnStop" class="btn btn-danger" disabled>
        <span class="btn-icon">&#9646;&#9646;</span>
        Stop &amp; Analyze
      </button>
    </div>

    <div class="snapshot-bar">
      <button id="btnSnapshot" class="btn btn-ghost">
        <span class="btn-icon">&#128247;</span>
        Copy Snapshot
      </button>
    </div>

    <div class="stats" id="statsPanel">
      <div class="stat-item">
        <span class="stat-label">Actions</span>
        <span class="stat-value" id="statActions">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Requests</span>
        <span class="stat-value" id="statRequests">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Contexts</span>
        <span class="stat-value" id="statContexts">0</span>
      </div>
    </div>

    <div class="settings">
      <div class="settings-header" id="settingsToggle">
        <span class="settings-icon">&#9881;</span>
        <span>Settings</span>
        <span class="settings-arrow" id="settingsArrow">&#9662;</span>
      </div>
      <div class="settings-body" id="settingsBody" style="display:none;">
        <div class="setting-row setting-row-stack">
          <button type="button" id="btnCopyLauncherUrl" class="btn btn-ghost btn-small">
            复制外部启动页模板链接
          </button>
          <p class="setting-hint" id="schemeHint">
            把链接里编码后的网址换成你的目标页，在地址栏打开即可拉起扩展页并自动录制（推荐方式，兼容性更好）。
          </p>
        </div>
        <div class="setting-row setting-row-stack" style="margin-top:8px;">
          <button type="button" id="btnCheckConnection" class="btn btn-ghost btn-small">
            🔍 检测 Native Host 连接
          </button>
          <div id="checkResult" class="check-result" style="display:none;"></div>
        </div>
      </div>
    </div>

    <div class="message" id="message"></div>

    <div class="privacy-notice" id="privacyNotice">
      <span class="privacy-icon">🔒</span>
      <span class="privacy-text">录制数据仅存储于本机，不上传任何服务器</span>
      <div class="privacy-detail">
        网络请求和操作记录通过 Native Messaging 发送至你本地安装的 WebTape CLI，
        在本机工作区保存和分析。认证凭证（Cookie 值、Authorization 头等）在生成
        AI 分析文档时会自动脱敏处理。
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
